<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portali i Kontakteve Avex</title>
    <style>
        :root {
            --avex-blue: #1e3a5f;
            --avex-light-blue: #3498db;
            --text-dark: #2c3e50;
            --border-color: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
        }

        /* Header me Logo dhe Titull */
        .header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid var(--border-color);
        }

        /* Përmirësimi i Logos Avex */
        .avex-logo {
            max-width: 250px; /* E zmadhuar pak për dukshmëri */
            height: auto;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Containeri kryesor me ndarjen 2x2 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-left: 5px solid var(--border-color);
            border-right: 5px solid var(--border-color);
            border-bottom: 5px solid var(--border-color);
            min-height: 80vh;
            background: white;
        }

        /* Përshtatja për Celular */
        @media (max-width: 700px) {
            .main-container { grid-template-columns: 1fr; }
            .quadrant { border-right: none !important; border-bottom: 5px solid var(--border-color) !important; }
        }

        .quadrant {
            padding: 20px;
            border-right: 3px solid var(--border-color);
            border-bottom: 3px solid var(--border-color);
            overflow-y: auto;
        }

        h2 {
            font-size: 22px;
            color: var(--avex-blue);
            margin: 0 0 15px 0;
            border-bottom: 3px solid var(--avex-light-blue);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 8px; border-bottom: 1px solid #eee; font-size: 16px; color: var(--text-dark); }
        .num { width: 30px; font-weight: bold; color: #7f8c8d; }
        
        .tel-link { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            background: var(--avex-light-blue);
            padding: 8px 12px;
            border-radius: 6px;
            white-space: nowrap;
            display: inline-block;
        }

        .loading { font-style: italic; color: #95a5a6; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://lh3.googleusercontent.com/d/11jmh4nqa0nqT1tO1dhi85vc_NUvAnCr3" alt="Avex Logo" class="avex-logo">
    <h1>Portali i Kontakteve Avex</h1>
</div>

<div class="main-container">
    <div class="quadrant">
        <h2>Zyra</h2>
        <table><tbody id="zyra-body"><tr><td class="loading">Duke ngarkuar...</td></tr></tbody></table>
    </div>

    <div class="quadrant">
        <h2>Shitja</h2>
        <table><tbody id="shitja-body"><tr><td class="loading">Duke ngarkuar...</td></tr></tbody></table>
    </div>

    <div class="quadrant">
        <h2>Shpërndarja</h2>
        <table><tbody id="shperndarja-body"><tr><td class="loading">Duke ngarkuar...</td></tr></tbody></table>
    </div>

    <div class="quadrant" style="border-bottom: none;">
        <h2>Magazina</h2>
        <table><tbody id="magazina-body"><tr><td class="loading">Duke ngarkuar...</td></tr></tbody></table>
    </div>
</div>

<script>
    const config = {
        'zyra-body': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlPlCjw7b9wd3wNaDkTLqzKrzO6dvcM3sXnlwVIPPjV2sY9Pmks6fmUyC8SPeJNKYLoMJo6vLaq6DT/pub?output=csv',
        'magazina-body': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQw0HlD6AAz335IsU3XsokC6KRR3QNZHlT7rI_fyHMTWWUZVbuTSKAX-1qKBCxYvMQ2lZCuiMlaw3xn/pub?output=csv',
        'shitja-body': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSI5sXsvoCNvPpOxLR_pVJC8Pkw4h9YvUXCbeq9CbrxcnSIkXUhfaV7HywQdPEhHG_GxY0xbQzcAdGV/pub?output=csv',
        'shperndarja-body': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjBXI6VHpxt53ED1VkQV7DoTsFdaQxlhAu1AnEF2TqX-a7ISD56N2mzZZ-vmaYK5FIt-9ABfqpEme2/pub?output=csv'
    };

    async function fetchSheetData(url, elementId) {
        try {
            const response = await fetch(url);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split(','));
            
            const tbody = document.getElementById(elementId);
            tbody.innerHTML = '';

            for (let i = 1; i < rows.length; i++) {
                const emri = rows[i][0] ? rows[i][0].trim() : "";
                const tel = rows[i][1] ? rows[i][1].trim() : "";

                if (emri || tel) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="num">${i}</td>
                        <td><strong>${emri}</strong></td>
                        <td><a href="tel:${tel}" class="tel-link">📞 ${tel}</a></td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        } catch (error) {
            document.getElementById(elementId).innerHTML = '<tr><td>Gabim në sinkronizim.</td></tr>';
        }
    }

    function refreshDashboard() {
        for (const [id, url] of Object.entries(config)) {
            fetchSheetData(url, id);
        }
    }

    refreshDashboard();
    setInterval(refreshDashboard, 120000);
</script>

</body>
</html>
